# Terraform Action to test Cloud Databases with test-harness

name: AWS Weekly Cloud Database Test Execution
on:
  # Triggers the workflow on a schedule for the main branch. Also allows for manual triggers
  # Execute every sunday at 4:00 AM
  schedule:
    - cron: "0 4 * * 0"
  workflow_dispatch:
    inputs:
      testClasses:
        type: choice
        description: Test Suite or test class to run
        options:
          - LiquibaseHarnessSuiteTest
          - FoundationalHarnessSuiteTest
          - AdvancedHarnessSuiteTest
          - ChangeObjectTests
          - ChangeDataTests
          - SnapshotObjectTests
          - GenerateChangelogTest
          - FoundationalTest
      databases:
        description: Databases to start up. Comma separated list of "name:version"
        required: true
        default: '["postgresql:12","postgresql:13","postgresql:14","oracle:aws_19","mariadb:aws_10.6","mysql:aws","mysql:aurora","mssql:aws_2019","postgresql:aurora"]'

permissions:
  contents: write
  id-token: write

jobs:
  setup:
    name: Setup
    runs-on: ubuntu-latest
    outputs:
      databases: ${{ github.event.inputs.databases || '["postgresql:12","postgresql:13","postgresql:14","oracle:aws_19","mariadb:aws_10.6","mysql:aws","mysql:aurora","mssql:aws_2019","postgresql:aurora"]' }}
      testClasses: ${{ inputs.testClasses  || 'LiquibaseHarnessSuiteTest' }}
    steps:
      - name: Checkout
        uses: liquibase/build-logic/.github/actions/checkout@1e4e22db353acf46bf8d947ce22309d2f704b4b6 # main

  deploy-ephemeral-cloud-infra:
    uses: liquibase/build-logic/.github/workflows/ephemeral-cloud-infra.yml@main
    secrets: inherit
    with:
      deploy: true
      aws_postgresql: ${{ github.event_name == 'schedule' || contains(inputs.databases, 'postgresql:12') || contains(inputs.databases, 'postgresql:13') || contains(inputs.databases, 'postgresql:14')}}
      aws_oracle: ${{ github.event_name == 'schedule' || contains(inputs.databases, 'oracle') }}
      aws_mariadb: ${{ github.event_name == 'schedule' || contains(inputs.databases, 'mariadb') }}
      aws_aurora_mysql: ${{ github.event_name == 'schedule' || contains(inputs.databases, 'mysql:aurora') }}
      aws_mssql: ${{ github.event_name == 'schedule' || contains(inputs.databases, 'mssql') }}
      aws_aurora_postgres: ${{ github.event_name == 'schedule' || contains(inputs.databases, 'postgresql:aurora') }}
      aws_mysql: ${{ github.event_name == 'schedule' || contains(inputs.databases, 'mysql:aws') }}

  init-mysql:
    runs-on: ubuntu-latest
    needs: [deploy-ephemeral-cloud-infra, setup]
    container:
      image: liquibase/liquibase:latest
      # --user root lets us apt-get install the AWS CLI and netcat inside the container so we can open the SSM tunnel; safe because the container is throwaway per CI run and only ever talks to our own AWS account via OIDC-issued credentials.
      options: --user root
    strategy:
      fail-fast: false
      matrix:
        include:
          - database: mysql
            version: aws
          - database: mysql
            version: aurora
    if: ${{ github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && (contains(needs.setup.outputs.databases, 'mysql:aws') || contains(needs.setup.outputs.databases, 'mysql:aurora'))) }}
    steps:
      - name: Checkout
        uses: liquibase/build-logic/.github/actions/checkout@1e4e22db353acf46bf8d947ce22309d2f704b4b6 # main

      - name: Configure AWS credentials for vault access
        uses: liquibase/build-logic/.github/actions/configure-aws-credentials@1e4e22db353acf46bf8d947ce22309d2f704b4b6 # main
        with:
          role-to-assume: ${{ secrets.LIQUIBASE_VAULT_OIDC_ROLE_ARN }}
          aws-region: us-east-1

      - name: Get secrets from vault
        id: vault-secrets
        uses: aws-actions/aws-secretsmanager-get-secrets@2cb1a461cbd4865ac4299648312e4704c646cd53 # v3.0.1
        with:
          secret-ids: |
            ,/vault/liquibase
          parse-json-secrets: true

      - name: Configure AWS Credentials
        uses: liquibase/build-logic/.github/actions/configure-aws-credentials@1e4e22db353acf46bf8d947ce22309d2f704b4b6 # main
        with:
          role-to-assume: ${{ env.AWS_DEV_GITHUB_OIDC_ROLE_ARN_BUILD_LOGIC }}
          aws-region: us-east-1

      - name: Configure Test
        id: setup
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            let splitValues = "${{ matrix.database }}".split(":")
            core.setOutput("databasePlatform", splitValues[0]);
            core.setOutput("databaseVersion", splitValues[1]);

      - name: Get AWS secrets
        if: ${{ matrix.version == 'aws' && matrix.database == 'mysql' && (github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && contains(needs.setup.outputs.databases, 'mysql:aws'))) }}
        uses: aws-actions/aws-secretsmanager-get-secrets@2cb1a461cbd4865ac4299648312e4704c646cd53 # v3.0.1
        with:
          secret-ids: |
            TH_MYSQLURL_8_0, /testautomation/db_details/aws_mysql_jdbc_${{ needs.deploy-ephemeral-cloud-infra.outputs.resources_id }}
            SSM_BASTION_INSTANCE_ID, /testautomation/ssm/bastion_instance_id
      - name: Get AWS secrets
        if: ${{ matrix.version == 'aurora' && matrix.database == 'mysql' && (github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && contains(needs.setup.outputs.databases, 'mysql:aurora'))) }}
        uses: aws-actions/aws-secretsmanager-get-secrets@2cb1a461cbd4865ac4299648312e4704c646cd53 # v3.0.1
        with:
          secret-ids: |
            TH_AURORA_MYSQLURL, /testautomation/db_details/aurora_mysql_jdbc_${{ needs.deploy-ephemeral-cloud-infra.outputs.resources_id }}
            SSM_BASTION_INSTANCE_ID, /testautomation/ssm/bastion_instance_id
      #This additional init step is required because of mysql driver issue on GH actions
      - name: Install Dependencies
        run: lpm update && lpm add mysql

      # TECHOPS-460 pilot: route the mysql:aws init through an SSM port-forwarding
      # tunnel to the test-automation bastion so the RDS instance can move to
      # publicly_accessible=false. The MySQL JDBC URL is rewritten to point at
      # localhost; everything else (auth, changelog, db name) is unchanged.
      - name: Parse MySQL endpoint from JDBC URL
        id: parse-mysql
        if: ${{ matrix.version == 'aws' && matrix.database == 'mysql' && (github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && contains(needs.setup.outputs.databases, 'mysql:aws'))) }}
        env:
          JDBC_URL: ${{ env.TH_MYSQLURL_8_0 }}
        shell: bash
        run: |
          set -euo pipefail
          # JDBC URL shape: jdbc:mysql://<host>:<port>/<dbname>[?...]
          host_port="${JDBC_URL#jdbc:mysql://}"
          host_port="${host_port%%/*}"
          host="${host_port%%:*}"
          port="${host_port##*:}"
          dbname_qs="${JDBC_URL##*/}"
          if [[ ! "$host" =~ ^[A-Za-z0-9.-]+$ ]] || [[ ! "$port" =~ ^[0-9]{1,5}$ ]]; then
            echo "::error::Could not parse host/port from JDBC URL" >&2
            exit 1
          fi
          echo "host=$host"     >> "$GITHUB_OUTPUT"
          echo "port=$port"     >> "$GITHUB_OUTPUT"
          echo "dbname-qs=$dbname_qs" >> "$GITHUB_OUTPUT"

      - name: Install AWS CLI and netcat
        if: ${{ matrix.database == 'mysql' && (github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && (contains(needs.setup.outputs.databases, 'mysql:aws') || contains(needs.setup.outputs.databases, 'mysql:aurora')))) }}
        shell: bash
        run: |
          set -euo pipefail
          apt-get update
          apt-get install -y --no-install-recommends netcat-openbsd unzip ca-certificates sudo
          if ! command -v aws >/dev/null 2>&1; then
            curl -fsSL https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip -o /tmp/awscli.zip
            unzip -q /tmp/awscli.zip -d /tmp
            /tmp/aws/install
            rm -rf /tmp/awscli.zip /tmp/aws
          fi
          aws --version
          command -v nc

      - name: Open SSM tunnel to MySQL
        if: ${{ matrix.version == 'aws' && matrix.database == 'mysql' && (github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && contains(needs.setup.outputs.databases, 'mysql:aws'))) }}
        uses: liquibase/build-logic/.github/actions/ssm-db-tunnel@1e4e22db353acf46bf8d947ce22309d2f704b4b6 # main
        with:
          bastion-instance-id: ${{ env.SSM_BASTION_INSTANCE_ID }}
          db-host: ${{ steps.parse-mysql.outputs.host }}
          db-port: ${{ steps.parse-mysql.outputs.port }}
          local-port: '13306'

      - name: Init Database
        if: ${{ matrix.version == 'aws' && matrix.database == 'mysql' && (github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && contains(needs.setup.outputs.databases, 'mysql:aws'))) }}
        env:
          LIQUIBASE_PRO_LICENSE_KEY: ${{ env.PRO_LICENSE_KEY }}
          TUNNELED_MYSQL_URL: jdbc:mysql://${{ env.TUNNELED_DB_HOST }}:${{ env.TUNNELED_DB_PORT }}/${{ steps.parse-mysql.outputs.dbname-qs }}
        run: liquibase --classpath="src/test/resources/init-changelogs/aws" --changeLogFile="${{ matrix.database }}_cloud.sql" --username="${{ env.TH_DB_ADMIN }}" --password="${{ env.TH_DB_PASSWD }}" --url="${{ env.TUNNELED_MYSQL_URL }}" update

      # TECHOPS-509: mirror the mysql:aws tunneling pattern for mysql:aurora so
      # init-mysql still works once aws-aurora-mysql flips publicly_accessible=false.
      - name: Parse Aurora MySQL endpoint from JDBC URL
        id: parse-aurora-mysql-init
        if: ${{ matrix.version == 'aurora' && matrix.database == 'mysql' && (github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && contains(needs.setup.outputs.databases, 'mysql:aurora'))) }}
        env:
          JDBC_URL: ${{ env.TH_AURORA_MYSQLURL }}
        shell: bash
        run: |
          set -euo pipefail
          # JDBC URL shape: jdbc:mysql://<host>[:<port>]/<dbname>[?...]
          tail="${JDBC_URL#jdbc:mysql://}"
          host_port="${tail%%/*}"
          dbname_qs="${tail#*/}"
          if [[ "$host_port" == *:* ]]; then
            host="${host_port%%:*}"
            port="${host_port##*:}"
          else
            host="$host_port"
            port="3306"
          fi
          if [[ ! "$host" =~ ^[A-Za-z0-9.-]+$ ]] || [[ ! "$port" =~ ^[0-9]{1,5}$ ]]; then
            echo "::error::Could not parse host/port from JDBC URL" >&2
            exit 1
          fi
          echo "host=$host"           >> "$GITHUB_OUTPUT"
          echo "port=$port"           >> "$GITHUB_OUTPUT"
          echo "dbname-qs=$dbname_qs" >> "$GITHUB_OUTPUT"

      - name: Open SSM tunnel to Aurora MySQL
        if: ${{ matrix.version == 'aurora' && matrix.database == 'mysql' && (github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && contains(needs.setup.outputs.databases, 'mysql:aurora'))) }}
        uses: liquibase/build-logic/.github/actions/ssm-db-tunnel@1e4e22db353acf46bf8d947ce22309d2f704b4b6 # main
        with:
          bastion-instance-id: ${{ env.SSM_BASTION_INSTANCE_ID }}
          db-host: ${{ steps.parse-aurora-mysql-init.outputs.host }}
          db-port: ${{ steps.parse-aurora-mysql-init.outputs.port }}
          local-port: '13306'

      - name: Init Database
        if: ${{ matrix.version == 'aurora' && matrix.database == 'mysql' && (github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && contains(needs.setup.outputs.databases, 'mysql:aurora'))) }}
        env:
          LIQUIBASE_PRO_LICENSE_KEY: ${{ env.PRO_LICENSE_KEY }}
          TUNNELED_AURORA_MYSQL_URL: jdbc:mysql://${{ env.TUNNELED_DB_HOST }}:${{ env.TUNNELED_DB_PORT }}/${{ steps.parse-aurora-mysql-init.outputs.dbname-qs }}
        run: liquibase --classpath="src/test/resources/init-changelogs/aws" --changeLogFile="${{ matrix.database }}_cloud.sql" --username="${{ env.TH_DB_ADMIN }}" --password="${{ env.TH_DB_PASSWD }}" --url="${{ env.TUNNELED_AURORA_MYSQL_URL }}" update

  test:
    needs: [deploy-ephemeral-cloud-infra, init-mysql, setup]
    # init-mysql only runs when mysql:aws or mysql:aurora is in the matrix.
    # For targeted dispatches that exclude mysql, init-mysql is `skipped` and
    # the default `needs` semantics would cascade-skip this job. Explicitly
    # gate on deploy-ephemeral + setup success and tolerate any init-mysql
    # outcome that isn't a hard failure so per-engine pilots can be smoke-tested.
    if: ${{ !cancelled() && needs.deploy-ephemeral-cloud-infra.result == 'success' && needs.setup.result == 'success' && needs.init-mysql.result != 'failure' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        database: ${{ fromJson(needs.setup.outputs.databases) }}

    steps:
      - name: Checkout
        uses: liquibase/build-logic/.github/actions/checkout@1e4e22db353acf46bf8d947ce22309d2f704b4b6 # main

      - name: Configure Test
        id: setup
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            let splitValues = "${{ matrix.database }}".split(":")
            core.setOutput("databasePlatform", splitValues[0]);
            core.setOutput("databaseVersion", splitValues[1]);

      - name: Configure AWS credentials for vault access
        uses: liquibase/build-logic/.github/actions/configure-aws-credentials@1e4e22db353acf46bf8d947ce22309d2f704b4b6 # main
        with:
          role-to-assume: ${{ secrets.LIQUIBASE_VAULT_OIDC_ROLE_ARN }}
          aws-region: us-east-1

      - name: Get secrets from vault
        id: vault-secrets
        uses: aws-actions/aws-secretsmanager-get-secrets@2cb1a461cbd4865ac4299648312e4704c646cd53 # v3.0.1
        with:
          secret-ids: |
            ,/vault/liquibase
          parse-json-secrets: true

      - name: Configure AWS Credentials
        uses: liquibase/build-logic/.github/actions/configure-aws-credentials@1e4e22db353acf46bf8d947ce22309d2f704b4b6 # main
        with:
          role-to-assume: ${{ env.AWS_DEV_GITHUB_OIDC_ROLE_ARN_BUILD_LOGIC }}
          aws-region: us-east-1

      - name: Get AWS secrets
        if: ${{ steps.setup.outputs.databasePlatform == 'mysql' && steps.setup.outputs.databaseVersion == 'aws' }}
        uses: aws-actions/aws-secretsmanager-get-secrets@2cb1a461cbd4865ac4299648312e4704c646cd53 # v3.0.1
        with:
          secret-ids: |
            TH_MYSQLURL_8_0, /testautomation/db_details/aws_mysql_jdbc_${{ needs.deploy-ephemeral-cloud-infra.outputs.resources_id }}
            SSM_BASTION_INSTANCE_ID, /testautomation/ssm/bastion_instance_id

      # TECHOPS-508 (child of TECHOPS-460): route the mysql:aws mvn test step
      # through the SSM port-forwarding tunnel so the aws-mysql RDS instance
      # can flip publicly_accessible=false. The init step in the init-mysql
      # container job is already tunneled via #1288.
      - name: Parse mysql endpoint from JDBC URL
        id: parse-mysql-test
        if: ${{ steps.setup.outputs.databasePlatform == 'mysql' && steps.setup.outputs.databaseVersion == 'aws' }}
        env:
          JDBC_URL: ${{ env.TH_MYSQLURL_8_0 }}
        shell: bash
        run: |
          set -euo pipefail
          # JDBC URL shape: jdbc:mysql://<host>:<port>/<dbname>[?...]
          tail="${JDBC_URL#jdbc:mysql://}"
          host_port="${tail%%/*}"
          dbname_qs="${tail#*/}"
          if [[ "$host_port" == *:* ]]; then
            host="${host_port%%:*}"
            port="${host_port##*:}"
          else
            host="$host_port"
            port="3306"
          fi
          if [[ ! "$host" =~ ^[A-Za-z0-9.-]+$ ]] || [[ ! "$port" =~ ^[0-9]{1,5}$ ]]; then
            echo "::error::Could not parse host/port from JDBC URL" >&2
            exit 1
          fi
          echo "host=$host"           >> "$GITHUB_OUTPUT"
          echo "port=$port"           >> "$GITHUB_OUTPUT"
          echo "dbname-qs=$dbname_qs" >> "$GITHUB_OUTPUT"

      - name: Open SSM tunnel to mysql
        if: ${{ steps.setup.outputs.databasePlatform == 'mysql' && steps.setup.outputs.databaseVersion == 'aws' }}
        uses: liquibase/build-logic/.github/actions/ssm-db-tunnel@1e4e22db353acf46bf8d947ce22309d2f704b4b6 # main
        with:
          bastion-instance-id: ${{ env.SSM_BASTION_INSTANCE_ID }}
          db-host: ${{ steps.parse-mysql-test.outputs.host }}
          db-port: ${{ steps.parse-mysql-test.outputs.port }}
          local-port: '13306'

      - name: Get AWS secrets
        if: ${{ steps.setup.outputs.databasePlatform == 'mysql' && steps.setup.outputs.databaseVersion == 'aurora' }}
        uses: aws-actions/aws-secretsmanager-get-secrets@2cb1a461cbd4865ac4299648312e4704c646cd53 # v3.0.1
        with:
          secret-ids: |
            TH_AURORA_MYSQLURL, /testautomation/db_details/aurora_mysql_jdbc_${{ needs.deploy-ephemeral-cloud-infra.outputs.resources_id }}
            SSM_BASTION_INSTANCE_ID, /testautomation/ssm/bastion_instance_id

      # TECHOPS-509 (child of TECHOPS-460): route the mysql:aurora mvn test
      # step through the SSM port-forwarding tunnel so the aws-aurora-mysql
      # cluster can flip publicly_accessible=false. init-mysql container job
      # already tunnels mysql:aurora via #1288.
      - name: Parse aurora-mysql endpoint from JDBC URL
        id: parse-aurora-mysql
        if: ${{ steps.setup.outputs.databasePlatform == 'mysql' && steps.setup.outputs.databaseVersion == 'aurora' }}
        env:
          JDBC_URL: ${{ env.TH_AURORA_MYSQLURL }}
        shell: bash
        run: |
          set -euo pipefail
          # JDBC URL shape: jdbc:mysql://<host>[:<port>]/<dbname>[?...]
          tail="${JDBC_URL#jdbc:mysql://}"
          host_port="${tail%%/*}"
          dbname_qs="${tail#*/}"
          if [[ "$host_port" == *:* ]]; then
            host="${host_port%%:*}"
            port="${host_port##*:}"
          else
            host="$host_port"
            port="3306"
          fi
          if [[ ! "$host" =~ ^[A-Za-z0-9.-]+$ ]] || [[ ! "$port" =~ ^[0-9]{1,5}$ ]]; then
            echo "::error::Could not parse host/port from JDBC URL" >&2
            exit 1
          fi
          echo "host=$host"           >> "$GITHUB_OUTPUT"
          echo "port=$port"           >> "$GITHUB_OUTPUT"
          echo "dbname-qs=$dbname_qs" >> "$GITHUB_OUTPUT"

      - name: Open SSM tunnel to aurora-mysql
        if: ${{ steps.setup.outputs.databasePlatform == 'mysql' && steps.setup.outputs.databaseVersion == 'aurora' }}
        uses: liquibase/build-logic/.github/actions/ssm-db-tunnel@1e4e22db353acf46bf8d947ce22309d2f704b4b6 # main
        with:
          bastion-instance-id: ${{ env.SSM_BASTION_INSTANCE_ID }}
          db-host: ${{ steps.parse-aurora-mysql.outputs.host }}
          db-port: ${{ steps.parse-aurora-mysql.outputs.port }}
          local-port: '13306'

      - name: Get AWS secrets
        if: ${{ steps.setup.outputs.databasePlatform == 'oracle' }}
        uses: aws-actions/aws-secretsmanager-get-secrets@2cb1a461cbd4865ac4299648312e4704c646cd53 # v3.0.1
        with:
          secret-ids: |
            TH_ORACLEURL_19_TH, /testautomation/db_details/aws_oracle_19_jdbc_${{ needs.deploy-ephemeral-cloud-infra.outputs.resources_id }}
            SSM_BASTION_INSTANCE_ID, /testautomation/ssm/bastion_instance_id

      - name: Get AWS secrets
        if: ${{ steps.setup.outputs.databasePlatform == 'postgresql' && steps.setup.outputs.databaseVersion != 'aurora' }}
        uses: aws-actions/aws-secretsmanager-get-secrets@2cb1a461cbd4865ac4299648312e4704c646cd53 # v3.0.1
        with:
          secret-ids: |
            TH_PGRESURL_12, /testautomation/db_details/aws_postgresql_12_jdbc_${{ needs.deploy-ephemeral-cloud-infra.outputs.resources_id }}
            TH_PGRESURL_13, /testautomation/db_details/aws_postgresql_13_jdbc_${{ needs.deploy-ephemeral-cloud-infra.outputs.resources_id }}
            TH_PGRESURL_14, /testautomation/db_details/aws_postgresql_14_jdbc_${{ needs.deploy-ephemeral-cloud-infra.outputs.resources_id }}
            SSM_BASTION_INSTANCE_ID, /testautomation/ssm/bastion_instance_id

      # TECHOPS-507 (child of TECHOPS-460): route postgresql:12/13/14 init+test
      # through the SSM port-forwarding tunnel so the underlying aws-postgres
      # RDS instances can flip publicly_accessible=false. parse-postgres extracts
      # host/port from the per-version JDBC URL; the composite action opens the
      # tunnel and exports TUNNELED_DB_HOST/TUNNELED_DB_PORT for the liquibase +
      # mvn steps below.
      - name: Parse postgres endpoint from JDBC URL
        id: parse-postgres
        if: ${{ steps.setup.outputs.databasePlatform == 'postgresql' && steps.setup.outputs.databaseVersion != 'aurora' }}
        env:
          JDBC_URL: ${{ env[format('TH_PGRESURL_{0}', steps.setup.outputs.databaseVersion)] }}
        shell: bash
        run: |
          set -euo pipefail
          # JDBC URL shape: jdbc:postgresql://<host>[:<port>]/<dbname>[?...]
          tail="${JDBC_URL#jdbc:postgresql://}"
          host_port="${tail%%/*}"
          dbname_qs="${tail#*/}"
          if [[ "$host_port" == *:* ]]; then
            host="${host_port%%:*}"
            port="${host_port##*:}"
          else
            host="$host_port"
            port="5432"
          fi
          if [[ ! "$host" =~ ^[A-Za-z0-9.-]+$ ]] || [[ ! "$port" =~ ^[0-9]{1,5}$ ]]; then
            echo "::error::Could not parse host/port from JDBC URL" >&2
            exit 1
          fi
          echo "host=$host"           >> "$GITHUB_OUTPUT"
          echo "port=$port"           >> "$GITHUB_OUTPUT"
          echo "dbname-qs=$dbname_qs" >> "$GITHUB_OUTPUT"

      - name: Open SSM tunnel to postgres
        if: ${{ steps.setup.outputs.databasePlatform == 'postgresql' && steps.setup.outputs.databaseVersion != 'aurora' }}
        uses: liquibase/build-logic/.github/actions/ssm-db-tunnel@1e4e22db353acf46bf8d947ce22309d2f704b4b6 # main
        with:
          bastion-instance-id: ${{ env.SSM_BASTION_INSTANCE_ID }}
          db-host: ${{ steps.parse-postgres.outputs.host }}
          db-port: ${{ steps.parse-postgres.outputs.port }}
          local-port: '15432'

      # liquibase/liquibase:latest (used by liquibase-github-action) does not
      # bundle the PostgreSQL JDBC driver since 5.0.3. Stage it into
      # liquibase_libs/ so the docker container picks it up via classpath.
      - name: Install PostgreSQL JDBC driver
        if: ${{ steps.setup.outputs.databasePlatform == 'postgresql' && steps.setup.outputs.databaseVersion != 'aurora' }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p liquibase_libs
          curl -fsSL -o liquibase_libs/postgresql.jar \
            https://jdbc.postgresql.org/download/postgresql-42.7.4.jar
          ls -la liquibase_libs/

      - name: Get AWS secrets
        if: ${{ steps.setup.outputs.databasePlatform == 'mariadb' }}
        uses: aws-actions/aws-secretsmanager-get-secrets@2cb1a461cbd4865ac4299648312e4704c646cd53 # v3.0.1
        with:
          secret-ids: |
            TH_MARIADBURL_10_6, /testautomation/db_details/aws_mariadb_jdbc_${{ needs.deploy-ephemeral-cloud-infra.outputs.resources_id }}
            SSM_BASTION_INSTANCE_ID, /testautomation/ssm/bastion_instance_id

      - name: Get AWS secrets
        if: ${{ steps.setup.outputs.databasePlatform == 'mssql' }}
        uses: aws-actions/aws-secretsmanager-get-secrets@2cb1a461cbd4865ac4299648312e4704c646cd53 # v3.0.1
        with:
          secret-ids: |
            TH_MSSQLURL, /testautomation/db_details/aws_mssql_jdbc_${{ needs.deploy-ephemeral-cloud-infra.outputs.resources_id }}
            SSM_BASTION_INSTANCE_ID, /testautomation/ssm/bastion_instance_id

      - name: Get AWS secrets
        if: ${{ steps.setup.outputs.databasePlatform == 'postgresql' && steps.setup.outputs.databaseVersion == 'aurora' }}
        uses: aws-actions/aws-secretsmanager-get-secrets@2cb1a461cbd4865ac4299648312e4704c646cd53 # v3.0.1
        with:
          secret-ids: |
            TH_AURORA_POSTGRESQLURL, /testautomation/db_details/aurora_postgresql16_jdbc_${{ needs.deploy-ephemeral-cloud-infra.outputs.resources_id }}
            SSM_BASTION_INSTANCE_ID, /testautomation/ssm/bastion_instance_id

      # TECHOPS-460 pilot: route the postgresql:aurora init+test through an SSM
      # port-forwarding tunnel so it works once the underlying Aurora PG cluster
      # flips publicly_accessible=false. parse-aurora-pg extracts host/port from
      # the JDBC URL; the composite action opens the tunnel and exports
      # TUNNELED_DB_HOST/TUNNELED_DB_PORT for the liquibase + mvn steps below.
      - name: Parse Aurora PG endpoint from JDBC URL
        id: parse-aurora-pg
        if: ${{ steps.setup.outputs.databasePlatform == 'postgresql' && steps.setup.outputs.databaseVersion == 'aurora' }}
        env:
          JDBC_URL: ${{ env.TH_AURORA_POSTGRESQLURL }}
        shell: bash
        run: |
          set -euo pipefail
          # JDBC URL shape: jdbc:postgresql://<host>[:<port>]/<dbname>[?...]
          tail="${JDBC_URL#jdbc:postgresql://}"
          host_port="${tail%%/*}"
          dbname_qs="${tail#*/}"
          if [[ "$host_port" == *:* ]]; then
            host="${host_port%%:*}"
            port="${host_port##*:}"
          else
            host="$host_port"
            port="5432"
          fi
          if [[ ! "$host" =~ ^[A-Za-z0-9.-]+$ ]] || [[ ! "$port" =~ ^[0-9]{1,5}$ ]]; then
            echo "::error::Could not parse host/port from JDBC URL" >&2
            exit 1
          fi
          echo "host=$host"           >> "$GITHUB_OUTPUT"
          echo "port=$port"           >> "$GITHUB_OUTPUT"
          echo "dbname-qs=$dbname_qs" >> "$GITHUB_OUTPUT"

      - name: Open SSM tunnel to Aurora PG
        if: ${{ steps.setup.outputs.databasePlatform == 'postgresql' && steps.setup.outputs.databaseVersion == 'aurora' }}
        uses: liquibase/build-logic/.github/actions/ssm-db-tunnel@1e4e22db353acf46bf8d947ce22309d2f704b4b6 # main
        with:
          bastion-instance-id: ${{ env.SSM_BASTION_INSTANCE_ID }}
          db-host: ${{ steps.parse-aurora-pg.outputs.host }}
          db-port: ${{ steps.parse-aurora-pg.outputs.port }}
          local-port: '15432'

      # liquibase/liquibase:latest (used by liquibase-github-action) does not
      # bundle the PostgreSQL JDBC driver since 5.0.3. Stage it into
      # liquibase_libs/ so the action's container picks it up via classpath.
      - name: Install PostgreSQL JDBC driver
        if: ${{ steps.setup.outputs.databasePlatform == 'postgresql' && steps.setup.outputs.databaseVersion == 'aurora' }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p liquibase_libs
          curl -fsSL -o liquibase_libs/postgresql.jar \
            https://jdbc.postgresql.org/download/postgresql-42.7.4.jar
          ls -la liquibase_libs/

      # TECHOPS-513: Liquibase 5.0.3 image no longer bundles non-H2 JDBC drivers.
      # Stage Oracle ojdbc11 into liquibase_libs/ and include it in classpath.
      # SHA-256 pinned (supply-chain integrity: fail if Maven Central artifact
      # is tampered with mid-download).
      - name: Install Oracle JDBC driver
        if: ${{ steps.setup.outputs.databasePlatform == 'oracle' }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p liquibase_libs
          curl -fsSL -o liquibase_libs/ojdbc11.jar \
            https://repo1.maven.org/maven2/com/oracle/database/jdbc/ojdbc11/23.5.0.24.07/ojdbc11-23.5.0.24.07.jar
          echo "2cc69b821da842c5f5be8877444631cf9fa89561f1f6f5ad7bf1293eb669fc27  liquibase_libs/ojdbc11.jar" | sha256sum -c -
          ls -la liquibase_libs/

      # Route oracle init+test through the SSM tunnel so the aws-oracle RDS
      # instance can flip publicly_accessible=false. Oracle JDBC URL shape is
      # jdbc:oracle:thin:@<host>:<port>:<sid> (SID form, used here).
      - name: Parse Oracle endpoint from JDBC URL
        id: parse-oracle
        if: ${{ steps.setup.outputs.databasePlatform == 'oracle' }}
        env:
          JDBC_URL: ${{ env.TH_ORACLEURL_19_TH }}
        shell: bash
        run: |
          set -euo pipefail
          # JDBC URL shape: jdbc:oracle:thin:@<host>:<port>:<sid>
          # (Could also be @//host:port/service; SID is what the secret uses.)
          tail="${JDBC_URL#jdbc:oracle:thin:@}"
          # Strip optional leading //
          tail="${tail#//}"
          # host:port:sid  OR  host:port/service
          host="${tail%%:*}"
          rest="${tail#*:}"
          port="${rest%%[:/]*}"
          tail_id="${rest#*[:/]}"
          if [[ ! "$host" =~ ^[A-Za-z0-9.-]+$ ]] || [[ ! "$port" =~ ^[0-9]{1,5}$ ]]; then
            echo "::error::Could not parse host/port from Oracle JDBC URL" >&2
            exit 1
          fi
          # tail_id may still contain a separator if the URL has both : and /
          echo "host=$host"     >> "$GITHUB_OUTPUT"
          echo "port=$port"     >> "$GITHUB_OUTPUT"
          echo "sid=$tail_id"   >> "$GITHUB_OUTPUT"

      - name: Open SSM tunnel to oracle
        if: ${{ steps.setup.outputs.databasePlatform == 'oracle' }}
        uses: liquibase/build-logic/.github/actions/ssm-db-tunnel@1e4e22db353acf46bf8d947ce22309d2f704b4b6 # main
        with:
          bastion-instance-id: ${{ env.SSM_BASTION_INSTANCE_ID }}
          db-host: ${{ steps.parse-oracle.outputs.host }}
          db-port: ${{ steps.parse-oracle.outputs.port }}
          local-port: '11521'

      # --network host lets the liquibase container see the SSM tunnel on the runner's "localhost" port (the prebuilt liquibase-github-action runs in its own isolated container that can't); safe because the container is throwaway and only ever talks to our own RDS through the bastion.
      - name: Init Oracle via SSM tunnel
        if: ${{ steps.setup.outputs.databasePlatform == 'oracle' }}
        env:
          LIQUIBASE_PRO_LICENSE_KEY: ${{ env.PRO_LICENSE_KEY }}
          DB_USERNAME: ${{ env.TH_DB_ADMIN }}
          DB_PASSWORD: ${{ env.TH_DB_PASSWD }}
          ORACLE_JDBC_URL: jdbc:oracle:thin:@${{ env.TUNNELED_DB_HOST }}:${{ env.TUNNELED_DB_PORT }}:${{ steps.parse-oracle.outputs.sid }}
        run: |
          docker run --rm --network host \
            -v "${PWD}:/workspace" \
            -w /workspace \
            -e LIQUIBASE_PRO_LICENSE_KEY \
            liquibase/liquibase:latest \
            --classpath="src/test/resources/init-changelogs/aws:liquibase_libs/ojdbc11.jar" \
            --changeLogFile="oracle.sql" \
            --username="$DB_USERNAME" \
            --password="$DB_PASSWORD" \
            --url="$ORACLE_JDBC_URL" \
            update

      # --network host lets the liquibase container see the SSM tunnel on the runner's "localhost" port (the prebuilt liquibase-github-action runs in its own isolated container that can't); safe because the container is throwaway and only ever talks to our own RDS through the bastion.
      - name: Init postgres via SSM tunnel
        if: ${{ steps.setup.outputs.databasePlatform == 'postgresql' && steps.setup.outputs.databaseVersion != 'aurora' }}
        env:
          LIQUIBASE_PRO_LICENSE_KEY: ${{ env.PRO_LICENSE_KEY }}
          DB_USERNAME: ${{ env.TH_DB_ADMIN }}
          DB_PASSWORD: ${{ env.TH_DB_PASSWD }}
          POSTGRES_JDBC_URL: jdbc:postgresql://${{ env.TUNNELED_DB_HOST }}:${{ env.TUNNELED_DB_PORT }}/${{ steps.parse-postgres.outputs.dbname-qs }}
        run: |
          docker run --rm --network host \
            -v "${PWD}:/workspace" \
            -w /workspace \
            -e LIQUIBASE_PRO_LICENSE_KEY \
            liquibase/liquibase:latest \
            --classpath="src/test/resources/init-changelogs/aws:liquibase_libs/postgresql.jar" \
            --changeLogFile="postgresql.sql" \
            --username="$DB_USERNAME" \
            --password="$DB_PASSWORD" \
            --url="$POSTGRES_JDBC_URL" \
            update

      # TECHOPS-513: stage MariaDB JDBC driver for Liquibase 5.0.3 image.
      # SHA-256 pinned (supply-chain integrity).
      - name: Install MariaDB JDBC driver
        if: ${{ steps.setup.outputs.databasePlatform == 'mariadb' }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p liquibase_libs
          curl -fsSL -o liquibase_libs/mariadb-java-client.jar \
            https://repo1.maven.org/maven2/org/mariadb/jdbc/mariadb-java-client/3.5.1/mariadb-java-client-3.5.1.jar
          echo "50a50c4a3c13c30dfbd40587f7ad9a496197d285ede0948641d9eee68fdf2106  liquibase_libs/mariadb-java-client.jar" | sha256sum -c -
          ls -la liquibase_libs/

      # Route mariadb init+test through the SSM tunnel so the aws-mariadb RDS
      # instance can flip publicly_accessible=false.
      - name: Parse mariadb endpoint from JDBC URL
        id: parse-mariadb
        if: ${{ steps.setup.outputs.databasePlatform == 'mariadb' }}
        env:
          JDBC_URL: ${{ env.TH_MARIADBURL_10_6 }}
        shell: bash
        run: |
          set -euo pipefail
          # JDBC URL shape: jdbc:mariadb://<host>[:<port>]/<dbname>[?...]
          tail="${JDBC_URL#jdbc:mariadb://}"
          host_port="${tail%%/*}"
          dbname_qs="${tail#*/}"
          if [[ "$host_port" == *:* ]]; then
            host="${host_port%%:*}"
            port="${host_port##*:}"
          else
            host="$host_port"
            port="3306"
          fi
          if [[ ! "$host" =~ ^[A-Za-z0-9.-]+$ ]] || [[ ! "$port" =~ ^[0-9]{1,5}$ ]]; then
            echo "::error::Could not parse host/port from JDBC URL" >&2
            exit 1
          fi
          echo "host=$host"           >> "$GITHUB_OUTPUT"
          echo "port=$port"           >> "$GITHUB_OUTPUT"
          echo "dbname-qs=$dbname_qs" >> "$GITHUB_OUTPUT"

      - name: Open SSM tunnel to mariadb
        if: ${{ steps.setup.outputs.databasePlatform == 'mariadb' }}
        uses: liquibase/build-logic/.github/actions/ssm-db-tunnel@1e4e22db353acf46bf8d947ce22309d2f704b4b6 # main
        with:
          bastion-instance-id: ${{ env.SSM_BASTION_INSTANCE_ID }}
          db-host: ${{ steps.parse-mariadb.outputs.host }}
          db-port: ${{ steps.parse-mariadb.outputs.port }}
          local-port: '13306'

      # --network host lets the liquibase container see the SSM tunnel on the runner's "localhost" port (the prebuilt liquibase-github-action runs in its own isolated container that can't); safe because the container is throwaway and only ever talks to our own RDS through the bastion.
      - name: Init mariadb via SSM tunnel
        if: ${{ steps.setup.outputs.databasePlatform == 'mariadb' }}
        env:
          LIQUIBASE_PRO_LICENSE_KEY: ${{ env.PRO_LICENSE_KEY }}
          DB_USERNAME: ${{ env.TH_DB_ADMIN }}
          DB_PASSWORD: ${{ env.TH_DB_PASSWD }}
          MARIADB_JDBC_URL: jdbc:mariadb://${{ env.TUNNELED_DB_HOST }}:${{ env.TUNNELED_DB_PORT }}/${{ steps.parse-mariadb.outputs.dbname-qs }}
        run: |
          docker run --rm --network host \
            -v "${PWD}:/workspace" \
            -w /workspace \
            -e LIQUIBASE_PRO_LICENSE_KEY \
            liquibase/liquibase:latest \
            --classpath="src/test/resources/init-changelogs/aws:liquibase_libs/mariadb-java-client.jar" \
            --changeLogFile="mariadb.sql" \
            --username="$DB_USERNAME" \
            --password="$DB_PASSWORD" \
            --url="$MARIADB_JDBC_URL" \
            update

      # Route mssql init+test through the SSM tunnel so the aws-mssql RDS
      # instance can flip publicly_accessible=false. JDBC URL shape is
      # jdbc:sqlserver://<host>:<port>;trustServerCertificate=true;databaseName=<db>
      - name: Parse mssql endpoint from JDBC URL
        id: parse-mssql
        if: ${{ steps.setup.outputs.databasePlatform == 'mssql' }}
        env:
          JDBC_URL: ${{ env.TH_MSSQLURL }}
        shell: bash
        run: |
          set -euo pipefail
          # jdbc:sqlserver://<host>:<port>;<key=val>;<key=val>...
          tail="${JDBC_URL#jdbc:sqlserver://}"
          host_port="${tail%%;*}"
          host="${host_port%%:*}"
          port="${host_port##*:}"
          if [[ ! "$host" =~ ^[A-Za-z0-9.-]+$ ]] || [[ ! "$port" =~ ^[0-9]{1,5}$ ]]; then
            echo "::error::Could not parse host/port from MSSQL JDBC URL" >&2
            exit 1
          fi
          echo "host=$host" >> "$GITHUB_OUTPUT"
          echo "port=$port" >> "$GITHUB_OUTPUT"

      - name: Open SSM tunnel to mssql
        if: ${{ steps.setup.outputs.databasePlatform == 'mssql' }}
        uses: liquibase/build-logic/.github/actions/ssm-db-tunnel@1e4e22db353acf46bf8d947ce22309d2f704b4b6 # main
        with:
          bastion-instance-id: ${{ env.SSM_BASTION_INSTANCE_ID }}
          db-host: ${{ steps.parse-mssql.outputs.host }}
          db-port: ${{ steps.parse-mssql.outputs.port }}
          local-port: '11433'

      # TECHOPS-513: stage MSSQL JDBC driver for Liquibase 5.0.3 image.
      # SHA-256 pinned (matches Maven Central published .jar.sha256).
      # Staged BEFORE the Create-lbcat step below — that step uses this jar.
      - name: Install MSSQL JDBC driver
        if: ${{ steps.setup.outputs.databasePlatform == 'mssql' }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p liquibase_libs
          curl -fsSL -o liquibase_libs/mssql-jdbc.jar \
            https://repo1.maven.org/maven2/com/microsoft/sqlserver/mssql-jdbc/12.8.1.jre11/mssql-jdbc-12.8.1.jre11.jar
          echo "e6933c0711e598a224060e52ed31392f720a4a7664e85d8ae37c52a85b67ebb0  liquibase_libs/mssql-jdbc.jar" | sha256sum -c -
          ls -la liquibase_libs/

      # Connect to "tempdb" (a SQL Server system DB that is recreated on every server restart and allows the RDS admin user to create tables) so liquibase can write its bookkeeping tables there, then run CREATE DATABASE lbcat: a cross-database operation the master user has rights for. The previous attempt against `master` failed because no user can CREATE TABLE there. ODBC-based sqlcmd (both Driver 13 and 18) fails to complete the TLS handshake through the tunnel at all; JDBC with trustServerCertificate=true does, which is why we use docker liquibase here.
      - name: Create lbcat database via liquibase
        if: ${{ steps.setup.outputs.databasePlatform == 'mssql' }}
        env:
          LIQUIBASE_PRO_LICENSE_KEY: ${{ env.PRO_LICENSE_KEY }}
          DB_USERNAME: ${{ env.TH_DB_ADMIN }}
          DB_PASSWORD: ${{ env.TH_DB_PASSWD }}
          TEMPDB_URL: jdbc:sqlserver://${{ env.TUNNELED_DB_HOST }}:${{ env.TUNNELED_DB_PORT }};trustServerCertificate=true;databaseName=tempdb
        run: |
          docker run --rm --network host \
            -v "${PWD}:/workspace" \
            -w /workspace \
            -e LIQUIBASE_PRO_LICENSE_KEY \
            liquibase/liquibase:latest \
            --classpath="liquibase_libs/mssql-jdbc.jar" \
            --url="$TEMPDB_URL" \
            --username="$DB_USERNAME" \
            --password="$DB_PASSWORD" \
            execute-sql --sql="IF NOT EXISTS (SELECT name FROM sys.databases WHERE name = N'lbcat') CREATE DATABASE lbcat"

      # --network host lets the liquibase container see the SSM tunnel on the runner's "localhost" port (the prebuilt liquibase-github-action runs in its own isolated container that can't); safe because the container is throwaway and only ever talks to our own RDS through the bastion.
      - name: Init mssql via SSM tunnel
        if: ${{ steps.setup.outputs.databasePlatform == 'mssql' }}
        env:
          LIQUIBASE_PRO_LICENSE_KEY: ${{ env.PRO_LICENSE_KEY }}
          DB_USERNAME: ${{ env.TH_DB_ADMIN }}
          DB_PASSWORD: ${{ env.TH_DB_PASSWD }}
          # trustServerCertificate=true skips cert validation for the same reason "-N false" does on sqlcmd above: we connect via "localhost" but the cert names the real RDS hostname (the SSM tunnel still encrypts the bytes underneath).
          MSSQL_JDBC_URL: jdbc:sqlserver://${{ env.TUNNELED_DB_HOST }}:${{ env.TUNNELED_DB_PORT }};trustServerCertificate=true;databaseName=lbcat
        run: |
          docker run --rm --network host \
            -v "${PWD}:/workspace" \
            -w /workspace \
            -e LIQUIBASE_PRO_LICENSE_KEY \
            liquibase/liquibase:latest \
            --classpath="src/test/resources/init-changelogs/aws:liquibase_libs/mssql-jdbc.jar" \
            --changeLogFile="mssql.sql" \
            --username="$DB_USERNAME" \
            --password="$DB_PASSWORD" \
            --url="$MSSQL_JDBC_URL" \
            update


      # --network host lets the liquibase container see the SSM tunnel on the runner's "localhost" port (the prebuilt liquibase-github-action runs in its own isolated container that can't); safe because the container is throwaway and only ever talks to our own RDS through the bastion.
      - name: Init Aurora PG via SSM tunnel
        if: ${{ steps.setup.outputs.databasePlatform == 'postgresql' && steps.setup.outputs.databaseVersion == 'aurora' }}
        env:
          LIQUIBASE_PRO_LICENSE_KEY: ${{ env.PRO_LICENSE_KEY }}
          DB_USERNAME: ${{ env.TH_DB_ADMIN }}
          DB_PASSWORD: ${{ env.TH_DB_PASSWD }}
          AURORA_PG_JDBC_URL: jdbc:postgresql://${{ env.TUNNELED_DB_HOST }}:${{ env.TUNNELED_DB_PORT }}/${{ steps.parse-aurora-pg.outputs.dbname-qs }}
        run: |
          docker run --rm --network host \
            -v "${PWD}:/workspace" \
            -w /workspace \
            -e LIQUIBASE_PRO_LICENSE_KEY \
            liquibase/liquibase:latest \
            --classpath="src/test/resources/init-changelogs/aws:liquibase_libs/postgresql.jar" \
            --changeLogFile="postgresql.sql" \
            --username="$DB_USERNAME" \
            --password="$DB_PASSWORD" \
            --url="$AURORA_PG_JDBC_URL" \
            update

      - uses: liquibase/build-logic/.github/actions/setup-java@1e4e22db353acf46bf8d947ce22309d2f704b4b6 # main
        with:
          java-version: "17"
          distribution: "temurin"
          cache: "maven"

      - name: Set up Maven settings.xml
        uses: liquibase/build-logic/.github/actions/setup-maven-settings@1e4e22db353acf46bf8d947ce22309d2f704b4b6 # main
        with:
          repositories: |
            [
              {"id": "github", "url": "https://maven.pkg.github.com/liquibase/liquibase", "releases": {"enabled": "true"}, "snapshots": {"enabled": "true", "updatePolicy": "always"}},
              {"id": "github-pro", "url": "https://maven.pkg.github.com/liquibase/liquibase-pro", "releases": {"enabled": "true"}, "snapshots": {"enabled": "true", "updatePolicy": "always"}}
            ]
          servers: |
            [
              {"id": "github", "username": "liquibot", "password": "${{ env.LIQUIBOT_PAT_GPM_ACCESS }}"},
              {"id": "github-pro", "username": "liquibot", "password": "${{ env.LIQUIBOT_PAT_GPM_ACCESS }}"}
            ]

      - name: AWS RDS ${{ steps.setup.outputs.databasePlatform }}-${{ steps.setup.outputs.databaseVersion }} Test Run
        if: ${{ steps.setup.outputs.databasePlatform == 'postgresql' && steps.setup.outputs.databaseVersion != 'aurora' }}
        env:
          LIQUIBASE_PRO_LICENSE_KEY: ${{ env.PRO_LICENSE_KEY }}
          TEST_CLASSES: ${{ needs.setup.outputs.testClasses }}
          DB_PLATFORM: ${{ steps.setup.outputs.databasePlatform }}
          DB_VERSION: ${{ steps.setup.outputs.databaseVersion }}
          DB_USERNAME: ${{ env.TH_DB_ADMIN }}
          DB_PASSWORD: ${{ env.TH_DB_PASSWD }}
          POSTGRES_JDBC_URL: jdbc:postgresql://${{ env.TUNNELED_DB_HOST }}:${{ env.TUNNELED_DB_PORT }}/${{ steps.parse-postgres.outputs.dbname-qs }}
        run: |
          echo "::group::Dependency Tree (PRO - liquibase-commercial)"
          mvn -B -PuseProArtifacts -DuseProArtifacts=true dependency:tree 2>&1 | grep -E "(liquibase|BUILD SUCCESS)" || true
          echo "::endgroup::"

          # [TECHOPS-645] Retry once on transient failure. Pure bash — no external action
          # required, compatible with org-wide GHA policy. Surefire rerunFailingTestsCount
          # is not applicable: tests run as Spock Specs inside a JUnit Platform @Suite.
          for _attempt in 1 2; do
            if mvn -PuseProArtifacts -DuseProArtifacts=true -Dtest="$TEST_CLASSES" -DconfigFile=/harness-config-cloud.yml -DdbName="$DB_PLATFORM" -DdbVersion="$DB_VERSION" -Dprefix=aws -DdbUsername="$DB_USERNAME" -DdbPassword="$DB_PASSWORD" -DdbUrl="$POSTGRES_JDBC_URL" test; then
              break
            elif [ "$_attempt" -lt 2 ]; then
              echo "::warning::Test attempt $_attempt failed, retrying..."
            else
              exit 1
            fi
          done

      - name: AWS RDS ${{ steps.setup.outputs.databasePlatform }}-${{ steps.setup.outputs.databaseVersion }} Test Run
        if: ${{ steps.setup.outputs.databasePlatform == 'oracle' }}
        env:
          LIQUIBASE_PRO_LICENSE_KEY: ${{ env.PRO_LICENSE_KEY }}
          TEST_CLASSES: ${{ needs.setup.outputs.testClasses }}
          DB_PLATFORM: ${{ steps.setup.outputs.databasePlatform }}
          DB_VERSION: ${{ steps.setup.outputs.databaseVersion }}
          DB_USERNAME: ${{ env.TH_DB_ADMIN }}
          DB_PASSWORD: ${{ env.TH_DB_PASSWD }}
          ORACLE_JDBC_URL: jdbc:oracle:thin:@${{ env.TUNNELED_DB_HOST }}:${{ env.TUNNELED_DB_PORT }}:${{ steps.parse-oracle.outputs.sid }}
        run: |
          echo "::group::Dependency Tree (PRO - liquibase-commercial)"
          mvn -B -PuseProArtifacts -DuseProArtifacts=true dependency:tree 2>&1 | grep -E "(liquibase|BUILD SUCCESS)" || true
          echo "::endgroup::"

          # [TECHOPS-645] Retry once on transient failure. Pure bash — no external action
          # required, compatible with org-wide GHA policy. Surefire rerunFailingTestsCount
          # is not applicable: tests run as Spock Specs inside a JUnit Platform @Suite.
          for _attempt in 1 2; do
            if mvn -PuseProArtifacts -DuseProArtifacts=true -Dtest="$TEST_CLASSES" -DconfigFile=/harness-config-cloud.yml -DdbName="$DB_PLATFORM" -DdbVersion="$DB_VERSION" -DdbUsername="$DB_USERNAME" -DdbPassword="$DB_PASSWORD" -DdbUrl="$ORACLE_JDBC_URL" test; then
              break
            elif [ "$_attempt" -lt 2 ]; then
              echo "::warning::Test attempt $_attempt failed, retrying..."
            else
              exit 1
            fi
          done

      - name: AWS RDS ${{ steps.setup.outputs.databasePlatform }}-${{ steps.setup.outputs.databaseVersion }} Test Run
        if: ${{ steps.setup.outputs.databasePlatform == 'mariadb' }}
        env:
          LIQUIBASE_PRO_LICENSE_KEY: ${{ env.PRO_LICENSE_KEY }}
          TEST_CLASSES: ${{ needs.setup.outputs.testClasses }}
          DB_PLATFORM: ${{ steps.setup.outputs.databasePlatform }}
          DB_VERSION: ${{ steps.setup.outputs.databaseVersion }}
          DB_USERNAME: ${{ env.TH_DB_ADMIN }}
          DB_PASSWORD: ${{ env.TH_DB_PASSWD }}
          MARIADB_JDBC_URL: jdbc:mariadb://${{ env.TUNNELED_DB_HOST }}:${{ env.TUNNELED_DB_PORT }}/${{ steps.parse-mariadb.outputs.dbname-qs }}
        run: |
          echo "::group::Dependency Tree (PRO - liquibase-commercial)"
          mvn -B -PuseProArtifacts -DuseProArtifacts=true dependency:tree 2>&1 | grep -E "(liquibase|BUILD SUCCESS)" || true
          echo "::endgroup::"

          # [TECHOPS-645] Retry once on transient failure. Pure bash — no external action
          # required, compatible with org-wide GHA policy. Surefire rerunFailingTestsCount
          # is not applicable: tests run as Spock Specs inside a JUnit Platform @Suite.
          for _attempt in 1 2; do
            if mvn -PuseProArtifacts -DuseProArtifacts=true -Dtest="$TEST_CLASSES" -DconfigFile=/harness-config-cloud.yml -DdbName="$DB_PLATFORM" -DdbVersion="$DB_VERSION" -DdbUsername="$DB_USERNAME" -DdbPassword="$DB_PASSWORD" -DdbUrl="$MARIADB_JDBC_URL" test; then
              break
            elif [ "$_attempt" -lt 2 ]; then
              echo "::warning::Test attempt $_attempt failed, retrying..."
            else
              exit 1
            fi
          done

      - name: AWS RDS ${{ steps.setup.outputs.databasePlatform }}-${{ steps.setup.outputs.databaseVersion }} Test Run
        if: ${{ steps.setup.outputs.databasePlatform == 'mysql' && steps.setup.outputs.databaseVersion == 'aws' }}
        env:
          LIQUIBASE_PRO_LICENSE_KEY: ${{ env.PRO_LICENSE_KEY }}
          TEST_CLASSES: ${{ needs.setup.outputs.testClasses }}
          DB_PLATFORM: ${{ steps.setup.outputs.databasePlatform }}
          DB_VERSION: ${{ steps.setup.outputs.databaseVersion }}
          DB_USERNAME: ${{ env.TH_DB_ADMIN }}
          DB_PASSWORD: ${{ env.TH_DB_PASSWD }}
          MYSQL_JDBC_URL: jdbc:mysql://${{ env.TUNNELED_DB_HOST }}:${{ env.TUNNELED_DB_PORT }}/${{ steps.parse-mysql-test.outputs.dbname-qs }}
        run: |
          echo "::group::Dependency Tree (PRO - liquibase-commercial)"
          mvn -B -PuseProArtifacts -DuseProArtifacts=true dependency:tree 2>&1 | grep -E "(liquibase|BUILD SUCCESS)" || true
          echo "::endgroup::"

          # [TECHOPS-645] Retry once on transient failure. Pure bash — no external action
          # required, compatible with org-wide GHA policy. Surefire rerunFailingTestsCount
          # is not applicable: tests run as Spock Specs inside a JUnit Platform @Suite.
          for _attempt in 1 2; do
            if mvn -PuseProArtifacts -DuseProArtifacts=true -Dtest="$TEST_CLASSES" -DconfigFile=/harness-config-cloud.yml -DdbName="$DB_PLATFORM" -DdbVersion="$DB_VERSION" -DdbUsername="$DB_USERNAME" -DdbPassword="$DB_PASSWORD" -DdbUrl="$MYSQL_JDBC_URL" test; then
              break
            elif [ "$_attempt" -lt 2 ]; then
              echo "::warning::Test attempt $_attempt failed, retrying..."
            else
              exit 1
            fi
          done

      - name: AWS RDS ${{ steps.setup.outputs.databasePlatform }}-${{ steps.setup.outputs.databaseVersion }} Test Run
        if: ${{ steps.setup.outputs.databasePlatform == 'mssql' }}
        env:
          LIQUIBASE_PRO_LICENSE_KEY: ${{ env.PRO_LICENSE_KEY }}
          TEST_CLASSES: ${{ needs.setup.outputs.testClasses }}
          DB_PLATFORM: ${{ steps.setup.outputs.databasePlatform }}
          DB_VERSION: ${{ steps.setup.outputs.databaseVersion }}
          DB_USERNAME: ${{ env.TH_DB_ADMIN }}
          DB_PASSWORD: ${{ env.TH_DB_PASSWD }}
          # trustServerCertificate=true skips cert validation because we connect via "localhost" but the cert names the real RDS hostname (the SSM tunnel still encrypts the bytes underneath).
          MSSQL_JDBC_URL: jdbc:sqlserver://${{ env.TUNNELED_DB_HOST }}:${{ env.TUNNELED_DB_PORT }};trustServerCertificate=true;databaseName=lbcat
        run: |
          echo "::group::Dependency Tree (PRO - liquibase-commercial)"
          mvn -B -PuseProArtifacts -DuseProArtifacts=true dependency:tree 2>&1 | grep -E "(liquibase|BUILD SUCCESS)" || true
          echo "::endgroup::"

          # [TECHOPS-645] Retry once on transient failure. Pure bash — no external action
          # required, compatible with org-wide GHA policy. Surefire rerunFailingTestsCount
          # is not applicable: tests run as Spock Specs inside a JUnit Platform @Suite.
          for _attempt in 1 2; do
            if mvn -PuseProArtifacts -DuseProArtifacts=true -Dtest="$TEST_CLASSES" -DconfigFile=/harness-config-cloud.yml -DdbName="$DB_PLATFORM" -DdbVersion="$DB_VERSION" -DdbUsername="$DB_USERNAME" -DdbPassword="$DB_PASSWORD" -DdbUrl="$MSSQL_JDBC_URL" test; then
              break
            elif [ "$_attempt" -lt 2 ]; then
              echo "::warning::Test attempt $_attempt failed, retrying..."
            else
              exit 1
            fi
          done

      - name: AWS Aurora ${{ steps.setup.outputs.databasePlatform }} Test Run
        if: ${{ steps.setup.outputs.databasePlatform == 'mysql' && steps.setup.outputs.databaseVersion == 'aurora' }}
        env:
          LIQUIBASE_PRO_LICENSE_KEY: ${{ env.PRO_LICENSE_KEY }}
          TEST_CLASSES: ${{ needs.setup.outputs.testClasses }}
          DB_PLATFORM: ${{ steps.setup.outputs.databasePlatform }}
          DB_VERSION: ${{ steps.setup.outputs.databaseVersion }}
          DB_USERNAME: ${{ env.TH_DB_ADMIN }}
          DB_PASSWORD: ${{ env.TH_DB_PASSWD }}
          AURORA_MYSQL_JDBC_URL: jdbc:mysql://${{ env.TUNNELED_DB_HOST }}:${{ env.TUNNELED_DB_PORT }}/${{ steps.parse-aurora-mysql.outputs.dbname-qs }}
        run: |
          echo "::group::Dependency Tree (PRO - liquibase-commercial)"
          mvn -B -PuseProArtifacts -DuseProArtifacts=true dependency:tree 2>&1 | grep -E "(liquibase|BUILD SUCCESS)" || true
          echo "::endgroup::"

          # [TECHOPS-645] Retry once on transient failure. Pure bash — no external action
          # required, compatible with org-wide GHA policy. Surefire rerunFailingTestsCount
          # is not applicable: tests run as Spock Specs inside a JUnit Platform @Suite.
          for _attempt in 1 2; do
            if mvn -PuseProArtifacts -DuseProArtifacts=true -Dtest="$TEST_CLASSES" -DconfigFile=/harness-config-cloud.yml -DdbName="$DB_PLATFORM" -DdbVersion="$DB_VERSION" -DdbUsername="$DB_USERNAME" -DdbPassword="$DB_PASSWORD" -DdbUrl="$AURORA_MYSQL_JDBC_URL" test; then
              break
            elif [ "$_attempt" -lt 2 ]; then
              echo "::warning::Test attempt $_attempt failed, retrying..."
            else
              exit 1
            fi
          done

      - name: AWS Aurora ${{ steps.setup.outputs.databasePlatform }} Test Run
        if: ${{ steps.setup.outputs.databasePlatform == 'postgresql' && steps.setup.outputs.databaseVersion == 'aurora' }}
        env:
          LIQUIBASE_PRO_LICENSE_KEY: ${{ env.PRO_LICENSE_KEY }}
          TEST_CLASSES: ${{ needs.setup.outputs.testClasses }}
          DB_PLATFORM: ${{ steps.setup.outputs.databasePlatform }}
          DB_USERNAME: ${{ env.TH_DB_ADMIN }}
          DB_PASSWORD: ${{ env.TH_DB_PASSWD }}
          AURORA_PG_JDBC_URL: jdbc:postgresql://${{ env.TUNNELED_DB_HOST }}:${{ env.TUNNELED_DB_PORT }}/${{ steps.parse-aurora-pg.outputs.dbname-qs }}
        run: |
          echo "::group::Dependency Tree (PRO - liquibase-commercial)"
          mvn -B -PuseProArtifacts -DuseProArtifacts=true dependency:tree 2>&1 | grep -E "(liquibase|BUILD SUCCESS)" || true
          echo "::endgroup::"

          # [TECHOPS-645] Retry once on transient failure. Pure bash — no external action
          # required, compatible with org-wide GHA policy. Surefire rerunFailingTestsCount
          # is not applicable: tests run as Spock Specs inside a JUnit Platform @Suite.
          for _attempt in 1 2; do
            if mvn -PuseProArtifacts -DuseProArtifacts=true -Dtest="$TEST_CLASSES" -DconfigFile=/harness-config-cloud.yml -DdbName="$DB_PLATFORM" -DdbVersion=16 -Dprefix=aurora -DdbUsername="$DB_USERNAME" -DdbPassword="$DB_PASSWORD" -DdbUrl="$AURORA_PG_JDBC_URL" test; then
              break
            elif [ "$_attempt" -lt 2 ]; then
              echo "::warning::Test attempt $_attempt failed, retrying..."
            else
              exit 1
            fi
          done

      - name: Archive AWS RDS ${{ steps.setup.outputs.databasePlatform }}-${{ steps.setup.outputs.databaseVersion }} Test Results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: aws-rds-${{ steps.setup.outputs.databasePlatform }}-${{ steps.setup.outputs.databaseVersion }}-test-results
          path: build/spock-reports

  get-stack-id:
    if: always()
    needs: [deploy-ephemeral-cloud-infra, test]
    runs-on: ubuntu-latest
    outputs:
      stack-id: ${{ steps.get-stack-id.outputs.stack-id }}
    steps:
      - name: Checkout
        uses: liquibase/build-logic/.github/actions/checkout@1e4e22db353acf46bf8d947ce22309d2f704b4b6 # main
      - name: Get Stack ID
        id: get-stack-id
        uses: ./.github/actions/get-stack-id
        with:
          stack-id: ${{ needs.deploy-ephemeral-cloud-infra.outputs.stack_id }}
          run-id: ${{ github.run_id }}

  destroy-ephemeral-cloud-infra:
    if: always()
    needs: [deploy-ephemeral-cloud-infra, test, get-stack-id]
    uses: liquibase/build-logic/.github/workflows/ephemeral-cloud-infra.yml@main
    secrets: inherit
    with:
      destroy: true
      stack_id: ${{ needs.get-stack-id.outputs.stack-id }}
      aws_postgresql: ${{ github.event_name == 'schedule' || contains(inputs.databases, 'postgresql:12') || contains(inputs.databases, 'postgresql:13') || contains(inputs.databases, 'postgresql:14')}}
      aws_oracle: ${{ github.event_name == 'schedule' || contains(inputs.databases, 'oracle') }}
      aws_mariadb: ${{ github.event_name == 'schedule' || contains(inputs.databases, 'mariadb') }}
      aws_aurora_mysql: ${{ github.event_name == 'schedule' || contains(inputs.databases, 'mysql:aurora') }}
      aws_mssql: ${{ github.event_name == 'schedule' || contains(inputs.databases, 'mssql') }}
      aws_aurora_postgres: ${{ github.event_name == 'schedule' || contains(inputs.databases, 'postgresql:aurora') }}
      aws_mysql: ${{ github.event_name == 'schedule' || contains(inputs.databases, 'mysql:aws') }}
