name: Create Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  actions: read
  issues: read
  pull-requests: read
  statuses: read
  security-events: write

jobs:
  create-release:
    uses: liquibase/build-logic/.github/workflows/create-release.yml@main
    secrets: inherit
    with:
      sonar: false
