# Basic workflow with Actions

name: Oracle Parallel Test Execution
on:
  schedule:
    - cron: "0 8 * * *" # Execute every day at 8am
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        plan: [18.4.0, 19.3.0, 23.2.0]

    steps:
      - uses: liquibase/build-logic/.github/actions/checkout@1e4e22db353acf46bf8d947ce22309d2f704b4b6 # main
      - run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"

      - name: Configure AWS credentials for vault access
        uses: liquibase/build-logic/.github/actions/configure-aws-credentials@1e4e22db353acf46bf8d947ce22309d2f704b4b6 # main
        with:
          role-to-assume: ${{ secrets.LIQUIBASE_VAULT_OIDC_ROLE_ARN }}
          aws-region: us-east-1

      - name: Get secrets from vault
        id: vault-secrets
        uses: aws-actions/aws-secretsmanager-get-secrets@2cb1a461cbd4865ac4299648312e4704c646cd53 # v3.0.1
        with:
          secret-ids: |
            ,/vault/liquibase
          parse-json-secrets: true

      - uses: liquibase/build-logic/.github/actions/setup-java@1e4e22db353acf46bf8d947ce22309d2f704b4b6 # main
        with:
          java-version: "17"
          distribution: "temurin"
          cache: "maven"

      - name: Set up Maven settings.xml
        uses: liquibase/build-logic/.github/actions/setup-maven-settings@39a2f8419c891bdb2a08a78b02f6a2c1bc8ae59e # main
        with:
          repositories: |
            [
              {"id": "github", "url": "https://maven.pkg.github.com/liquibase/liquibase", "releases": {"enabled": "true"}, "snapshots": {"enabled": "true", "updatePolicy": "always"}},
              {"id": "github-pro", "url": "https://maven.pkg.github.com/liquibase/liquibase-pro", "releases": {"enabled": "true"}, "snapshots": {"enabled": "true", "updatePolicy": "always"}}
            ]
          servers: |
            [
              {"id": "github", "username": "liquibot", "password": "${{ env.LIQUIBOT_PAT_GPM_ACCESS }}"},
              {"id": "github-pro", "username": "liquibot", "password": "${{ env.LIQUIBOT_PAT_GPM_ACCESS }}"}
            ]

      - name: Docker login to retrive Oracle images from private repo
        run: docker login "${{ env.REPO_URL }}" -u "${{ env.REPO_USER }}" -p "${{ env.REPO_PASSWORD }}"

      - name: Build Oracle Artifactory test infra
        if: ${{ matrix.plan == '19.3.0' }}
        working-directory: src/test/resources/docker/oracle-artifactory
        run: docker compose up -d

      - name: Build Oracle XE test infra
        if: ${{ matrix.plan != '19.3.0' }}
        working-directory: src/test/resources/docker/oracle-xe
        run: |
          # Constructing service name from version
          SERVICE_NAME="oracle-xe-${{ matrix.plan }}"
          docker compose up -d $SERVICE_NAME

      # Adding sleep to avoid ORA-12514 error when database & listeners are still in the middle of startup
      - name: Sleep for 180 seconds
        run: sleep 180

      - name: Oracle ${{ matrix.plan }} Test Run
        # [TECHOPS-645/734] Bounded retry via the shared composite action so transient
        # failures self-heal. The matrix value is passed as an input (mapped to an env
        # var) and referenced as a quoted shell variable in the command, per GitHub's
        # script-injection hardening guidance.
        uses: liquibase/build-logic/.github/actions/retry-test@39a2f8419c891bdb2a08a78b02f6a2c1bc8ae59e
        with:
          target: oracle-${{ matrix.plan }}
          pro-license-key: ${{ env.PRO_LICENSE_KEY }}
          db-version: ${{ matrix.plan }}
          pre-command: |-
            docker ps
            echo "::group::Dependency Tree (PRO - liquibase-commercial)"
            mvn -B -PuseProArtifacts -DuseProArtifacts=true dependency:tree 2>&1 | grep -E "(liquibase|BUILD SUCCESS)" || true
            echo "::endgroup::"
          command: |-
            mvn -PuseProArtifacts -DuseProArtifacts=true -ntp -Dtest=LiquibaseHarnessSuiteTest -DdbName=oracle -DdbVersion="$DB_VERSION" test

      - name: Archive Oracle ${{ matrix.plan }} test results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: oracle-${{ matrix.plan }}-test-results
          path: build/spock-reports

      - name: Tear down Oracle test infra
        working-directory: src/test/resources/docker/oracle-artifactory
        run: docker compose down --volumes

      - name: Tear down Oracle XE test infra
        working-directory: src/test/resources/docker/oracle-xe
        run: docker compose down --volumes
